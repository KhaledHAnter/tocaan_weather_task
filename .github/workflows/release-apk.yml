name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          version="${GITHUB_REF_NAME:-manual-$(date +%Y%m%d%H%M%S)}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/tocaan-weather-${version}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/tocaan-weather-*.apk
          generate_release_notes: true
          # Only tag pushes create a real, permanent release; manual runs
          # (no tag) still build and upload the APK as a draft so nothing
          # gets accidentally published without a version tag.
          draft: ${{ github.ref_type != 'tag' }}
