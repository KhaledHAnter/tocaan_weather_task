name: tocaan_weather_task
description: "Tocaan Weather - a Flutter weather application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_bloc: ^9.1.1

  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  freezed_annotation: ^3.1.0

  easy_localization: ^3.0.8

  flutter_screenutil: ^5.9.3

  font_awesome_flutter: ^11.0.0

  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  very_good_analysis: ^10.1.0
  custom_lint: ^0.8.1
  tocaan_lints:
    path: packages/tocaan_lints
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  build_runner: ^2.9.0
  freezed: ^3.2.3

flutter_native_splash:
  color: "#102133"
  image: "assets/images/adaptive_icon.png"
  branding: "assets/images/branding.png"
  branding_mode: bottom
  android_12:
    color: "#102133"
    image: "assets/images/adaptive_icon.png"
    branding: "assets/images/branding.png"
  web: false

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: "launcher_icon"
  min_sdk_android: 21
  adaptive_icon_background: "#102133"
  adaptive_icon_foreground: "assets/images/adaptive_icon.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#102133"
    theme_color: "#102133"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lang/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100

    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal-ExtraLight.ttf
          weight: 200
